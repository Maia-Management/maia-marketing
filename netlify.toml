[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, no-transform"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; form-action 'self'; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate, no-transform"

[[redirects]]
  from = "https://www.maia-marketing.com/*"
  to = "https://maia-marketing.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://marketing.maia-management.com/*"
  to = "https://maia-marketing.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# Legacy ?lang=en URLs → standalone /en/ route (separately-indexable English page).
[[redirects]]
  from = "/"
  query = {lang = "en"}
  to = "/en/"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  query = {lang = "en"}
  to = "/en/"
  status = 301
  force = true

# Symmetric: legacy ?lang=es on /en/ → root.
[[redirects]]
  from = "/en/"
  query = {lang = "es"}
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/en/index.html"
  to = "/en/"
  status = 301
  force = true

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 301
  force = true

[[redirects]]
  from = "/images/2026-04-26_maia-marketing_imagen_team-creative-session.png"
  to = "/images/maia-marketing-team.webp"
  status = 301
  force = true

[[redirects]]
  from = "/images/people/andrew-luz-marketing.png"
  to = "/images/people/andrew-luz-marketing.webp"
  status = 301
  force = true

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/en/thank-you"
  to = "/en/thank-you.html"
  status = 200
